<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iranian Business Reports</title>
    <meta name="description" content="An archive of data reports published by Iranian businesses. Search and filter reports by year and category.">
    <meta name="keywords" content="Iran, business, reports, data, analytics, archive, PDFs">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://mahdimajidzadeh.github.io/iranian-businesses-data-reports/">

    <!-- Favicons -->
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="icon" href="favicon.png" type="image/png" sizes="128x128">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="theme-color" content="#3b6fde">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mahdimajidzadeh.github.io/iranian-businesses-data-reports/">
    <meta property="og:title" content="Iranian Business Reports">
    <meta property="og:description" content="An archive of data reports published by Iranian businesses.">
    <meta property="og:image" content="https://mahdimajidzadeh.github.io/iranian-businesses-data-reports/ibr-preview.png">
    <meta property="og:image:alt" content="Iranian Business Reports preview image">
    <meta property="og:site_name" content="Iranian Business Reports">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Iranian Business Reports">
    <meta name="twitter:description" content="An archive of data reports published by Iranian businesses.">
    <meta name="twitter:image" content="https://mahdimajidzadeh.github.io/iranian-businesses-data-reports/ibr-preview.png">
    <meta name="twitter:image:alt" content="Iranian Business Reports preview image">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bump ?v= on every deploy that changes CSS/JS so browsers don't serve stale cached assets. -->
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="site-header">
      <div class="container">
        <div class="header-bar">
          <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle color theme" title="Toggle theme">
            <span class="icon" id="themeIcon">☾</span><span id="themeLabel">Dark</span>
          </button>
        </div>
        <div class="header-main">
          <div class="header-text">
            <span class="eyebrow"><span class="dot"></span>Public data archive</span>
            <h1 class="main-title">Iranian Business Reports</h1>
            <p class="subtitle">An archive of data reports published by Iranian businesses — searchable, categorized, and free to download.</p>
          </div>
          <div class="header-actions">
            <a href="https://github.com/MahdiMajidzadeh/iranian-businesses-data-reports"
               target="_blank" rel="noopener" class="btn btn-outline">
              <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38l-.01-1.49c-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.4 7.4 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48l-.01 2.2c0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/></svg>
              View GitHub Repository
            </a>
            <a href="https://github.com/MahdiMajidzadeh/iranian-businesses-data-reports/issues/new"
               target="_blank" rel="noopener" class="btn btn-accent">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><path d="M8 3v10M3 8h10"/></svg>
              Add New Report
            </a>
          </div>
        </div>
      </div>
    </header>

    <!-- Main -->
    <main class="content">
      <section class="toolbar" aria-label="Search and filter">
        <div class="toolbar-row">
          <div class="search-wrap">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true"><circle cx="7" cy="7" r="5"/><path d="m14 14-3.5-3.5" stroke-linecap="round"/></svg>
            <input id="searchInput" type="search" class="search-input"
                   placeholder="Search by title, year, or tag…" aria-label="Search reports">
          </div>
          <select id="yearSelect" class="year-select" aria-label="Filter by year">
            <option value="">All years</option>
          </select>
        </div>
        <div id="tagList" class="tag-list"></div>
      </section>

      <div class="result-bar">
        <p id="resultCount" class="result-count"></p>
        <span class="sort-label">Newest first</span>
      </div>

      <div id="titleList" class="reports-grid"></div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="container">
        <div class="footer-inner">
          <p>Maintained by <a href="https://www.linkedin.com/in/mahdimajidzadeh/" target="_blank" rel="noopener">Mahdi Majidzadeh</a>.</p>
          <p class="muted">Open data · Free to download</p>
        </div>
      </div>
    </footer>
  </div>

  <script src="app.js?v=2"></script>
</body>
</html>
